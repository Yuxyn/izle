<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İçerik Yükleniyor...</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 80px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #fff; }
        #timer { font-size: 28px; color: #00d2ff; font-weight: bold; margin: 25px 0; }
        #reklam-kutusu { width: 100%; height: 250px; background: #252525; border-radius: 8px; line-height: 250px; color: #666; border: 1px dashed #444; margin-bottom: 20px; }
        #asil-icerik { display: none; animation: fadeIn 0.5s; }
        .buton { display: inline-block; background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; padding: 15px 35px; text-decoration: none; border-radius: 30px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4); }
        .buton:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(110, 142, 251, 0.6); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h2>Dosya Hazırlanıyor</h2>
        <div id="reklam-kutusu">Reklam Yükleniyor...</div>
        <div id="timer">15</div>
        <p style="font-size: 14px; color: #888;">Lütfen bekleyin, otomatik yönlendirileceksiniz.</p>

        <div id="asil-icerik">
            <h3 style="color: #2ed573;">✔ Hazır!</h3>
            <p>İstediğiniz içeriğe aşağıdaki butondan ulaşabilirsiniz.</p>
            <a href="https://omg10.com/4/10723472" class="buton" target="_blank">İÇERİĞİ AÇ</a>
        </div>
    </div>

    <script>
        let saniye = 15;
        const sayac = setInterval(function() {
            saniye--;
            document.getElementById("timer").innerText = saniye;
            if (saniye <= 0) {
                clearInterval(sayac);
                document.getElementById("timer").style.display = "none";
                document.getElementById("asil-icerik").style.display = "block";
            }
        }, 1000);
    </script>
</body>
</html>
