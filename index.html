<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hazırlanıyor...</title>
    <style>
        body { 
            background: #0f0f0f; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #1a1a1a; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
            border: 1px solid #333; 
            width: 90%; 
            max-width: 400px; 
        }
        #timer { font-size: 60px; font-weight: bold; color: #3498db; margin: 20px 0; }
        .btn { 
            display: none; 
            background: linear-gradient(135deg, #2ecc71, #27ae60); 
            color: white; 
            padding: 18px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 20px; 
            transition: 0.3s transform; 
            cursor: pointer; 
            border: none;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }
        .btn:hover { transform: scale(1.05); }
        .loader { 
            border: 4px solid #333; 
            border-top: 4px solid #3498db; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="loader" id="loader"></div>
    <h2 id="title">Güvenli Bağlantı Kuruluyor</h2>
    <p id="sub-text">Lütfen bekleyin, video sunucusuyla eşleşiliyor...</p>
    <div id="timer">15</div>
    
    <a href="https://mega.nz/file/7HQRRbCL#BFkLS-WE6Woo34uA4yQ81aqCsO9Oy-vbgRuKQB2ozvs" class="btn" id="videoBtn" target="_blank">VİDEOYU İZLE (HD)</a>
</div>

<script>
    let timeLeft = 15;
    const timerElement = document.getElementById('timer');
    const btnElement = document.getElementById('videoBtn');
    const loaderElement = document.getElementById('loader');
    const titleElement = document.getElementById('title');
    const subText = document.getElementById('sub-text');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.style.display = 'none';
            loaderElement.style.display = 'none';
            titleElement.textContent = "Bağlantı Başarılı!";
            titleElement.style.color = "#2ecc71";
            subText.textContent = "Videonuz hazır. İyi seyirler.";
            btnElement.style.display = 'inline-block';
        }
    }, 1000);
</script>

</body>
</html>
